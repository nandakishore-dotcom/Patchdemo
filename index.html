 if(s.modal){showModal(s.modal)}

}
function positionHighlight(s){
 const h=document.getElementById('highlight'), c=document.getElementById('callout'), portal=document.getElementById('portal');
 c.style.display='none';
 let box=null;
 if(s.target){
   const el=portal.querySelector(`[data-demo-target="${s.target}"]`);
   if(el){
     const r=el.getBoundingClientRect(), pr=portal.getBoundingClientRect();
     const pad = el.dataset.demoPad ? parseInt(el.dataset.demoPad,10) : 10;
     box={x:r.left-pr.left-pad,y:r.top-pr.top-pad,w:r.width+pad*2,h:r.height+pad*2};
   }
 }
 if(!box && s.h) box=s.h;
 if(!box){h.style.display='none';return}
 const maxW=portal.clientWidth-28, maxH=portal.clientHeight-92;
 box.x=Math.max(16,Math.min(box.x,maxW-box.w));
 box.y=Math.max(16,Math.min(box.y,maxH-box.h));
 h.style.display='block';h.style.left=box.x+'px';h.style.top=box.y+'px';h.style.width=box.w+'px';h.style.height=box.h+'px';
}

function configuredActions(){return `<div class="screen"><div class="configured-card"><h3>Target windows OS updates satisfying the following</h3><span class="number-pill">#1</span><div class="criteria-row"><div class="input">Severity</div><div class="input">Is</div><div class="input"><span class="selected-token">Critical ×</span></div></div><div class="configured-actions"><span>♢</span><span>♲</span></div></div><div class="config-section"><b>Specify updates to ignore</b><button class="btn">Add</button></div><div class="config-section"><b>Configure automation rules</b><button class="btn" data-demo-target="rules-add" data-demo-pad="12" onclick="showModal('rulesModal')">Add</button></div><div class="config-section"><b>Configure device end notifications</b><button class="btn" data-demo-target="notify-add" data-demo-pad="12" onclick="showModal('notifyModal')">Add</button></div></div>`}
const scheduleState = { mode:'repeat', days:['Tuesday'], hour:11, minute:0, timezone:'(UTC +00:00) Etc/GMT' };
function setScheduleMode(mode){
  scheduleState.mode = mode;
  if(mode === 'repeat' && scheduleState.days.length === 0){ scheduleState.days = ['Tuesday']; }
  document.getElementById('portalContent').innerHTML = builderFrame(2, scheduleBody(mode));
  setTimeout(()=>positionHighlight({target: mode === 'repeat' ? 'schedule-repeat' : 'schedule-once'}),50);
}
function toggleScheduleDay(day){
  const i = scheduleState.days.indexOf(day);
  if(i >= 0){ scheduleState.days.splice(i,1); }
  else { scheduleState.days.push(day); }
  document.getElementById('portalContent').innerHTML = builderFrame(2, scheduleBody('repeat'));
  setTimeout(()=>positionHighlight({target:'schedule-days'}),50);
}
function updateScheduleTime(part,value){
  const n = Math.max(0, parseInt(value,10) || 0);
  if(part === 'hour') scheduleState.hour = Math.min(23,n);
  if(part === 'minute') scheduleState.minute = Math.min(59,n);
  const h=document.getElementById('schedHour'), m=document.getElementById('schedMinute');
  if(h) h.value = scheduleState.hour;
  if(m) m.value = scheduleState.minute;
}
function fillSchedule(){ setScheduleMode('repeat'); }
function advanceToTargetFilters(){
  document.getElementById('portalContent').innerHTML = builderFrame(3, targetFilters());
  setTimeout(()=>positionHighlight({target:'add-groups'}),50);
}
function scheduleBody(mode){
  mode = mode || scheduleState.mode || 'repeat';
  const days = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const dayMarkup = days.map(d=>`<span class="day-check ${scheduleState.days.includes(d)?'on':''}" onclick="toggleScheduleDay('${d}')"><i class="day-box"></i>${d}</span>`).join('');
  const repeatSelected = mode === 'repeat';
  const onceSelected = mode === 'once';
  return `<div class="schedule-form">
    <div class="sched-row"><label>Trigger</label><div><span class="radio on"></span>Time</div></div>
    <div class="sched-row"><label>Initiate</label><div class="radio-line">
      <span class="clickable" onclick="setScheduleMode('asap')"><span class="radio ${mode==='asap'?'on':''}"></span>Once, ASAP</span>
      <span class="clickable" data-demo-target="schedule-once" data-demo-pad="10" onclick="setScheduleMode('once')"><span class="radio ${onceSelected?'on':''}"></span>Once</span>
      <span class="clickable" data-demo-target="schedule-repeat" data-demo-pad="10" onclick="setScheduleMode('repeat')"><span class="radio ${repeatSelected?'on':''}"></span>Repeat at a set schedule</span>
    </div></div>
    ${repeatSelected ? `<div class="sched-row"><label>Scheduled Day</label><div>
      <div class="schedule-select clickable" data-demo-target="schedule-days" data-demo-pad="8">Selected Days <span>⌄</span></div>
      <div class="repeat-days">${dayMarkup}</div>
    </div></div>` : ''}
    ${onceSelected ? `<div class="sched-row"><label>Scheduled Time</label><div>
      <div style="display:flex;gap:12px;align-items:flex-start"><div><div class="input" data-demo-target="schedule-date" data-demo-pad="10" style="width:310px;color:#111;display:flex;align-items:center;justify-content:space-between">Today / 11:00 PM <span style="color:#111">▣</span></div></div>
      <input id="schedHour" class="time-input" value="${scheduleState.hour}" onchange="updateScheduleTime('hour',this.value)"><span style="color:#6b7f95;line-height:46px">hour</span>
      <input id="schedMinute" class="time-input" value="${scheduleState.minute}" onchange="updateScheduleTime('minute',this.value)"><span style="color:#6b7f95;line-height:46px">minute</span>
      <div class="schedule-select" style="width:360px">${scheduleState.timezone} <span>⌄</span></div></div>
    </div></div>` : ''}
    ${repeatSelected ? `<div class="sched-row"><label>Scheduled Time</label><div style="display:flex;gap:10px;align-items:center" data-demo-target="schedule-time" data-demo-pad="10">
      <input id="schedHour" class="time-input" value="${scheduleState.hour}" onchange="updateScheduleTime('hour',this.value)"><span style="color:#6b7f95">hour(s)</span>
      <input id="schedMinute" class="time-input" value="${scheduleState.minute}" onchange="updateScheduleTime('minute',this.value)"><span style="color:#6b7f95">minute(s)</span>
      <div class="schedule-select" style="width:380px">${scheduleState.timezone} <span>⌄</span></div>
    </div></div>` : ''}
    ${mode==='asap' ? `<div class="sched-row"><label></label><div class="flowline decision schedule-note"><strong>Not selected for this story:</strong> Once, ASAP would risk restarting POS-WIN-001 during active store hours.</div></div>` : `<div class="sched-row"><label></label><div class="flowline decision schedule-note"><strong>Store-hours scheduling:</strong> this critical patch workflow runs after store close. Days and time are editable; Tuesday at 11:00 PM is selected for the demo.</div></div>`}
    <button class="btn primary" data-demo-target="schedule-next" data-demo-pad="12" style="margin-left:320px" onclick="advanceToTargetFilters()">Continue to Target Filters</button>
  </div>`;
}
function targetFilters(){return `<div class="target-tabs"><a class="active">Included groups</a><a>Excluded groups</a><a>Filters</a></div><div class="screen"><button class="btn primary" data-demo-target="add-groups" data-demo-pad="12" onclick="toast('Target group set to Store 042 POS devices')">Add Groups</button><div class="empty-table"><div class="empty-head"><span>Group Name</span><span>Group Type</span></div><div class="empty-body"><div class="empty-illus">🗂️</div><div>Nothing to show here yet!</div></div></div><div class="card" style="margin-top:24px;max-width:900px"><h3>Story target</h3><div class="flowline decision"><strong>Target for the narrative:</strong> POS-WIN-001 / Store 042 Windows POS. The demo keeps the remediation path scoped to one business-critical device.</div></div></div>`}

render();
</script>
</body>
</html>
